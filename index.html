<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>App Adriana Presidente - Corações</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Degradê suave que se funde com a imagem */
            background: linear-gradient(to bottom, #dcd9d4 0%, #e0e0e0 100%);
        }

        /* Imagem da Capivara Engenheira */
        .capivara {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            z-index: 1;
        }

        /* Camada da Chuva */
        #chuva {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .item {
            position: absolute;
            user-select: none;
            animation: queda linear forwards, pulsar 1.5s ease-in-out infinite;
        }

        /* Estilo do Coração Lilás */
        .lilas {
            color: #b19cd9;
            text-shadow: 0 0 10px rgba(177, 156, 217, 0.8);
        }

        @keyframes queda {
            from { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            to { transform: translateY(110vh) rotate(360deg); opacity: 0.8; }
        }

        /* Animação de pulsar */
        @keyframes pulsar {
            0%, 100% { scale: 1; }
            50% { scale: 1.2; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="capivara_engenheira.png" class="capivara">
        <div id="chuva"></div>
    </div>

    <script>
        const chuva = document.getElementById('chuva');
        
        // Mantemos apenas o Coração Lilás (Emoji💜) no código
        const item = { txt: '💜', classe: 'lilas' };

        function criarItem() {
            const div = document.createElement('div');
            
            div.className = 'item ' + item.classe;
            div.innerHTML = item.txt;
            
            const duracao = Math.random() * 3 + 2;
            div.style.left = Math.random() * 100 + 'vw';
            div.style.fontSize = Math.random() * 15 + 20 + 'px';
            div.style.animationDuration = duracao + 's, 1.5s'; // Tempo de queda e pulsar

            chuva.appendChild(div);

            setTimeout(() => div.remove(), duracao * 1000);
        }

        setInterval(criarItem, 150);
    </script>
</body>
</html>
