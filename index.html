<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>App Adriana Presidente</title>
    <style>
        /* Reset para tela cheia total */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4d0b5;
        }

        /* FUNDO DESFOCADO PARA PREENCHER O VAZIO (Efeito Profissional) */
        .fundo-blur {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('capivara_engenheira.png');
            background-size: cover;
            background-position: center;
            filter: blur(20px) brightness(0.8);
            transform: scale(1.1);
            z-index: 1;
        }

        /* IMAGEM PRINCIPAL (Ajustada para o iPhone) */
        .capivara {
            position: relative;
            width: 100%;
            height: 100%;
            /* O segredo está aqui: aumenta um pouco para a obra aparecer mas não sumir */
            object-fit: cover; 
            object-position: center;
            z-index: 2;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }

        /* CAMADA DA CHUVA DE CORAÇÕES */
        #chuva {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .item {
            position: absolute;
            user-select: none;
            animation: queda linear forwards, pulsar 1.5s ease-in-out infinite;
        }

        .lilas {
            color: #b19cd9;
            text-shadow: 0 0 15px rgba(177, 156, 217, 1);
            font-size: 30px;
        }

        @keyframes queda {
            from { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            to { transform: translateY(110vh) rotate(360deg); opacity: 0.7; }
        }

        @keyframes pulsar {
            0%, 100% { scale: 1; }
            50% { scale: 1.3; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="fundo-blur"></div>
        
        <img src="capivara_engenheira.png" class="capivara">
        
        <div id="chuva"></div>
    </div>

    <script>
        const chuva = document.getElementById('chuva');
        const item = { txt: '💜', classe: 'lilas' };

        function criarItem() {
            const div = document.createElement('div');
            div.className = 'item ' + item.classe;
            div.innerHTML = item.txt;
            
            const duracao = Math.random() * 3 + 3;
            div.style.left = Math.random() * 100 + 'vw';
            div.style.fontSize = Math.random() * 20 + 20 + 'px';
            div.style.animationDuration = duracao + 's, 1.5s';

            chuva.appendChild(div);
            setTimeout(() => div.remove(), duracao * 1000);
        }

        setInterval(criarItem, 150);
    </script>
</body>
</html>
