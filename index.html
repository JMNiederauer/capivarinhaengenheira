<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>App Adriana Presidente</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Cor de fundo inspirada no entardecer da sua imagem */
            background: #f4d0b5; 
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Degradê que imita o pôr do sol para preencher o resto da tela */
            background: linear-gradient(to bottom, #f9e5d8 0%, #f4d0b5 50%, #e8b08d 100%);
        }

        /* Ajuste para a imagem aparecer INTEIRA na largura do iPhone */
        .capivara {
            width: 100%; /* Força a imagem a ocupar toda a largura disponível */
            height: auto; /* Deixa a altura proporcional para não cortar as laterais */
            max-width: 100%;
            z-index: 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); /* Sombra leve para destacar */
        }

        #chuva {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .item {
            position: absolute;
            user-select: none;
            animation: queda linear forwards, pulsar 1.5s ease-in-out infinite;
        }

        .lilas {
            color: #b19cd9;
            text-shadow: 0 0 10px rgba(177, 156, 217, 0.8);
        }

        @keyframes queda {
            from { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            to { transform: translateY(110vh) rotate(360deg); opacity: 0.8; }
        }

        @keyframes pulsar {
            0%, 100% { scale: 1; }
            50% { scale: 1.3; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="capivara_engenheira.png" class="capivara">
        <div id="chuva"></div>
    </div>

    <script>
        const chuva = document.getElementById('chuva');
        const item = { txt: '💜', classe: 'lilas' };

        function criarItem() {
            const div = document.createElement('div');
            div.className = 'item ' + item.classe;
            div.innerHTML = item.txt;
            
            const duracao = Math.random() * 3 + 3;
            div.style.left = Math.random() * 100 + 'vw';
            div.style.fontSize = Math.random() * 20 + 15 + 'px';
            div.style.animationDuration = duracao + 's, 1.5s';

            chuva.appendChild(div);
            setTimeout(() => div.remove(), duracao * 1000);
        }

        setInterval(criarItem, 200);
    </script>
</body>
</html>
